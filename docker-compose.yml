  # 4. FASTAPI
  api:
    build: .
    image: multik-core:latest
    container_name: multik_api
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn main_api:app --host 0.0.0.0 --port 8000
    env_file: [.env]
    volumes:
      - ./:/app
      - ./hf_cache:/root/.cache/huggingface
      - ./static:/app/static 
      - ./images_cache:/app/images_cache
    environment:
      - HF_HUB_OFFLINE=1      
      - TRANSFORMERS_OFFLINE=1
      - OLLAMA_HOST=http://ollama_container:11434
      - REDIS_HOST=172.17.0.1