services:
  # 1. OLLAMA
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_container
    restart: always
    ports:
      - "11434:11434"  # <--- ДОБАВЬ ЭТУ СТРОКУ ОБЯЗАТЕЛЬНО!
    volumes:
      - /home/amlin04/.ollama:/root/.ollama
    environment:
      - OLLAMA_MAX_QUEUE=128
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_PARALLEL=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10

