services:
  # 1. OLLAMA
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_container
    restart: always
    ports:
      - "11434:11434"  
    volumes:
      - /home/amlin04/.ollama:/root/.ollama
    environment:
      - OLLAMA_MAX_QUEUE=128
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. QDRANT (Векторная база данных) 🚀
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    restart: always
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC (для быстрой работы)
    volumes:
      - ./qdrant_storage:/qdrant/storage # Тут будут лежать ноды

  # 3. FASTAPI
  api:
    build: .
    image: multik-core:latest
    container_name: multik_api
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    depends_on:
      - ollama
      - qdrant
    ports:
      - "8000:8000"
    command: uvicorn main_api:app --host 0.0.0.0 --port 8000 
    env_file: [.env]
    volumes:
      - ./:/app
      - ./hf_cache:/root/.cache/huggingface
      - ./static:/app/static 
      - ./images_cache:/app/images_cache
    environment:
      - HF_HUB_OFFLINE=1      
      - TRANSFORMERS_OFFLINE=1
      - OLLAMA_HOST=http://ollama_container:11434
      - QDRANT_HOST=qdrant # Подключаемся по имени сервиса
      - QDRANT_PORT=6333
      - REDIS_HOST=172.17.0.1
